services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lab-note-app
    restart: always
    ports:
      - "${APP_PORT}:5000"
    volumes:
      - .:/app
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    command: flask run --host=0.0.0.0 --port=5000

  db:
    image: postgres:16
    container_name: postgresql-db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env
    healthcheck:      
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -t 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s


volumes:
  postgres_data:
    