services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: flask-lab-note-app
    restart: always
    expose:
      - "5000"
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build: ./nginx
    container_name: "nginx"
    ports:
      - 1337:80
    depends_on:
      - web

  db:
    image: postgres:16
    container_name: postgresql-db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env
    healthcheck:      
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -t 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
    